services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: drought
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d drought"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/drought
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-openai/gpt-oss-120b}
      NVIDIA_MODELS: ${NVIDIA_MODELS:-openai/gpt-oss-120b,nvidia/nemotron-3-super-120b-a12b,z-ai/glm-5.1,qwen/qwen3-next-80b-a3b-instruct,qwen/qwen3.5-397b-a17b,moonshotai/kimi-k2.6,minimaxai/minimax-m2.7,deepseek-ai/deepseek-v4-flash,google/gemma-4-31b-it}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-60}
    volumes:
      - ./data:/app/data
      - ${DATASETS_ROOT:-/mnt/f/Datasets}:/datasets:ro
      - ${SPI_CACHE_ROOT:-./data/spi_cache}:/spi-cache
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.worker.celery_app worker -Q drought --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/drought
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-openai/gpt-oss-120b}
      NVIDIA_MODELS: ${NVIDIA_MODELS:-openai/gpt-oss-120b,nvidia/nemotron-3-super-120b-a12b,z-ai/glm-5.1,qwen/qwen3-next-80b-a3b-instruct,qwen/qwen3.5-397b-a17b,moonshotai/kimi-k2.6,minimaxai/minimax-m2.7,deepseek-ai/deepseek-v4-flash,google/gemma-4-31b-it}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-60}
    volumes:
      - ./data:/app/data
      - ${DATASETS_ROOT:-/mnt/f/Datasets}:/datasets:ro
      - ${SPI_CACHE_ROOT:-./data/spi_cache}:/spi-cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports: ["8080:80"]
    depends_on: [backend]

volumes:
  pgdata:
